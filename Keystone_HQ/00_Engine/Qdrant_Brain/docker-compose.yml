version: '3.8'

services:
  # ============================================
  # MAIN BRAIN — Production (Antigravity ONLY)
  # Port 6333 — NO external access, no tunnels
  # ============================================
  qdrant-main:
    image: qdrant/qdrant:latest
    container_name: keystone_qdrant_brain
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - /home/curtis/Keystone_HQ/00_Master_Brain:/vault:ro
    restart: unless-stopped

  # ============================================
  # CLONE BRAIN — DMZ Quarantine (Spark sandbox)
  # Port 7333 — Isolated, wipe-safe, reviewable
  # ============================================
  qdrant-clone:
    image: qdrant/qdrant:latest
    container_name: keystone_qdrant_clone
    ports:
      - "7333:6333"
      - "7334:6334"
    volumes:
      - ./qdrant_clone_storage:/qdrant/storage
      - /home/curtis/Keystone_HQ/00_Master_Brain:/vault:ro
    restart: unless-stopped
